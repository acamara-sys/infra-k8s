# ─────────────────────────────────────────────────────────────────────────────
# SECRET — NE PAS mettre les vraies valeurs dans un fichier commité.
# Ce fichier ne contient QUE des commentaires (aucun objet) → safe à `apply`.
#
# Crée le Secret en impératif (les vraies valeurs ne touchent jamais git) :
#
#   kubectl create secret generic wallet-secrets -n wallet \
#     --from-literal=DATABASE_URL='postgresql://skoleom:skoleom_dev@postgres:5432/wallet' \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=STRIPE_SECRET_KEY='sk_test_dummy' \
#     --from-literal=STRIPE_WEBHOOK_SECRET='whsec_dummy'
#
# Notes :
#  - DATABASE_URL doit matcher les identifiants du Deployment postgres (skoleom / skoleom_dev / wallet)
#  - STRIPE_SECRET_KEY doit être NON VIDE (sinon le server crashe au boot) → 'sk_test_dummy' suffit pour démarrer
#  - remplace par tes vraies clés Stripe quand tu voudras que les paiements marchent
# ─────────────────────────────────────────────────────────────────────────────
